<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>game</title>
</head>

<body>
  <!-- Lobby Screen -->
  <div id="lobby"
    style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.85); padding:40px; color:white; font-family:sans-serif; text-align:center; border-radius:12px; z-index:100; min-width:350px;">
    <h1 style="font-size:42px; margin:0 0 8px;">Duck Survival</h1>
    <p style="margin-bottom:24px; color:#aaa; font-size:16px;">Multiplayer Co-op</p>
    <div style="display:flex; flex-direction:column; gap:12px;">
      <button id="createRoomBtn"
        style="padding:12px 24px; font-size:16px; cursor:pointer; border:none; background:#4caf50; color:white; border-radius:6px; font-weight:bold;">Create
        Room</button>
      <div style="display:flex; gap:8px;">
        <input id="roomCodeInput" type="text" placeholder="Room Code" maxlength="5"
          style="flex:1; padding:12px; font-size:16px; border:1px solid #555; border-radius:6px; background:#222; color:white; text-align:center; text-transform:uppercase; letter-spacing:4px;">
        <button id="joinRoomBtn"
          style="padding:12px 24px; font-size:16px; cursor:pointer; border:none; background:#2196f3; color:white; border-radius:6px; font-weight:bold;">Join</button>
      </div>
    </div>
    <div id="roomCodeDisplay"
      style="display:none; margin-top:20px; padding:16px; background:#1a1a2e; border-radius:8px; border:2px solid #4caf50;">
      <p style="margin:0 0 4px; color:#aaa; font-size:13px;">Room Code</p>
      <p id="roomCodeText"
        style="margin:0; font-size:36px; font-weight:bold; letter-spacing:8px; color:#4caf50;"></p>
    </div>
    <button id="startGameBtn"
      style="display:none; margin-top:16px; padding:14px 32px; font-size:18px; cursor:pointer; border:none; background:#ff9800; color:white; border-radius:6px; font-weight:bold;">Start
      Game</button>
    <p id="lobbyStatus" style="margin-top:16px; color:#aaa; font-size:14px;"></p>
  </div>

  <!-- Game UI (hidden until game starts) -->
  <div id="gameUI" style="display:none;">
    <div id="gameOver"
      style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.8); padding:40px; color:white; font-family:sans-serif; text-align:center; border-radius:10px; flex-direction:column; align-items:center; gap:20px; width:400px; z-index:50;">
      <h1 style="font-size:48px; margin:0;">Game Over</h1>
      <p style="font-size:20px; margin:0;">You were caught by an NPC!</p>
      <p id="finalTime" style="font-size:20px; margin:0; color:#ffaa00;"></p>
      <p id="finalKills" style="font-size:20px; margin:0; color:#ffaa00;"></p>
      <button onclick="window.location.reload()"
        style="padding:12px 30px; font-size:18px; cursor:pointer; border:none; background:white; color:black; border-radius:6px;">Play
        Again</button>
    </div>
    <div
      style="position:absolute; top:20px; right:20px; text-align:right; font-family:Arial; text-shadow:2px 2px 4px black; display:flex; flex-direction:column; gap:6px;">
      <div id="level" style="color:#ffdd00; font-size:28px; font-weight:bold;">Level 1</div>
      <div id="timer" style="color:white; font-size:22px;">Time: 0s</div>
      <div id="kills" style="color:white; font-size:22px;">Kills: 0</div>
    </div>
    <!-- Boss Health Bar -->
    <div id="bossBarContainer"
      style="display:none; position:absolute; top:16px; left:50%; transform:translateX(-50%); width:50%; min-width:300px; background:rgba(0,0,0,0.6); border-radius:6px; padding:6px 10px; border:2px solid rgba(180,0,180,0.6);">
      <div
        style="color:#dd88ff; font-family:Arial; font-size:13px; font-weight:bold; text-align:center; margin-bottom:4px; letter-spacing:2px; text-shadow:0 0 8px #aa00ff;">
        ☠ BOSS FOX
      </div>
      <div
        style="background:#1a001a; border-radius:4px; height:16px; overflow:hidden; border:1px solid rgba(180,0,180,0.4);">
        <div id="bossBarInner"
          style="width:100%; height:100%; background:linear-gradient(90deg,#6a0080,#cc00cc); border-radius:4px; transition:width 0.15s;">
        </div>
      </div>
    </div>

    <!-- Ultimate Button -->
    <div id="ultimateBtn"
      style="position:absolute; right:28px; bottom:40px; width:72px; height:72px; border-radius:50%; user-select:none;">
      <!-- charge ring fills clockwise -->
      <div id="ultimateCharge"
        style="position:absolute; inset:0; border-radius:50%; background:conic-gradient(#ffd700 0%, rgba(255,255,255,0.08) 0%);">
      </div>
      <!-- transparent inner face -->
      <div
        style="position:absolute; inset:5px; border-radius:50%; background:rgba(0,0,0,0.15); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; border:1px solid rgba(255,215,0,0.2);">
        <span style="font-size:24px; line-height:1; opacity:0.35;">🦆</span>
        <span
          style="color:rgba(255,255,255,0.6); font-size:11px; font-family:Arial; font-weight:bold; letter-spacing:1px;">Q</span>
      </div>
    </div>

    <!-- Health Bar -->
    <div id="healthBarContainer"
      style="position:absolute; bottom:30px; left:50%; transform:translateX(-50%); width:300px; background:rgba(0,0,0,0.5); border-radius:8px; padding:4px; border:2px solid rgba(255,255,255,0.4);">
      <div
        style="color:white; font-family:Arial; font-size:13px; text-align:center; margin-bottom:3px; text-shadow:1px 1px 2px black;">
        ❤ HEALTH — <span id="healthNumber">100</span> / 100</div>
      <div style="background:#333; border-radius:5px; height:18px; overflow:hidden;">
        <div id="healthBarInner"
          style="width:100%; height:100%; background:#4caf50; border-radius:5px; transition:width 0.2s, background-color 0.3s;">
        </div>
      </div>
    </div>
  </div>

  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
